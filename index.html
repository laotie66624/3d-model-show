<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D模型展示页面</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    body { margin: 0; }
    model-viewer { width: 100vw; height: 100vh; background: #f5f5f5; }
  </style>
</head>
<body>
  <model-viewer
    src="lingxing.glb"  <!-- 替换为实际3D模型文件名 -->
    alt="3D交互模型"
    ar  <!-- 开启手机AR功能 -->
    camera-controls  <!-- 支持旋转/缩放/平移 -->
    auto-rotate  <!-- 模型自动旋转 -->
    shadow-intensity="1"
  ></model-viewer>
</body>
</html>
